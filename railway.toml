[build]
builder = "NIXPACKS"
buildCommand = "cd server && npm ci && npm run build && npx prisma generate"

[deploy]
startCommand = "cd server && npx prisma migrate deploy && npm run start"
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
